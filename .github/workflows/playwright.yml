name: Playwright Tests

permissions:
  contents: read
on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update snapshots?'
        type: boolean
        required: false
        default: false

jobs:
  test:
    timeout-minutes: 60
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
      options: --ipc=host
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: dummy-anon-key
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Playwright tests
      if: ${{ !inputs.update_snapshots }}
      id: run-tests
      run: npm run test:e2e
      continue-on-error: true

    - name: Update Snapshots (if tests failed)
      if: ${{ !inputs.update_snapshots && steps.run-tests.outcome == 'failure' }}
      id: update-snapshots
      run: npx playwright test --update-snapshots

    - name: Run Playwright tests (Manual Update Snapshots)
      if: ${{ inputs.update_snapshots }}
      run: npx playwright test --update-snapshots

    # If snapshots were updated, we need to commit them back.
    - name: Commit updated snapshots
      if: ${{ (inputs.update_snapshots || steps.update-snapshots.outcome == 'success') && success() }}
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "test: update playwright snapshots (Linux)"
        file_pattern: '**/*-snapshots/**/*'

    - name: Fail if tests failed and snapshots didn't fix it
      if: ${{ steps.run-tests.outcome == 'failure' && steps.update-snapshots.outcome != 'success' }}
      run: exit 1

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
