name: Playwright Tests

permissions:
  contents: write

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update snapshots?'
        type: boolean
        required: false
        default: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy # Matches package.json
      options: --ipc=host
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: fake-anon-key
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Functional Tests (Exclude Visual)
      run: npx playwright test --grep-invert visual
      
    - name: Run Visual Tests
      if: ${{ !inputs.update_snapshots }}
      id: visual-tests
      run: npx playwright test --grep visual
      continue-on-error: true

    - name: Update Snapshots (if visual failed)
      if: ${{ !inputs.update_snapshots && steps.visual-tests.outcome == 'failure' }}
      id: auto-update
      run: npx playwright test --grep visual --update-snapshots

    - name: Manual Update Snapshots
      if: ${{ inputs.update_snapshots }}
      run: npx playwright test --update-snapshots

    - name: Fix Dubious Ownership
      run: git config --global --add safe.directory /__w/ltta/ltta

    - name: Commit updated snapshots
      if: always()
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "test: auto-update playwright snapshots (Linux CI)"
        file_pattern: '**/*-snapshots/**/*'

    - name: Fail if tests failed and snapshots didn't fix it
      if: ${{ steps.visual-tests.outcome == 'failure' && steps.auto-update.outcome == 'failure' }}
      run: exit 1

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  deploy-preview:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Deploy Preview
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy Preview from ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

