name: Deploy Staging DB

on:
  push:
    branches:
      - staging
    paths:
      - 'supabase/staging/**'
      - 'scripts/reset-staging-db.js'
  workflow_dispatch:

jobs:
  reset-db:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Reset Staging Database
        run: pnpm run db:staging:reset
        env:
          STAGING_DB_URL: ${{ secrets.DB_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
