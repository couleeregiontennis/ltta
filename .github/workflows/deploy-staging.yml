name: Deploy Staging DB

on:
  push:
    branches:
      - staging
    paths:
      - 'supabase/staging/**'
      - 'scripts/reset-staging-db.js'
  workflow_dispatch:

jobs:
  reset-db:
    runs-on: ubuntu-latest
    environment: staging
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.DB_URL }} # Temporary hack: We will extract the password from the DB_URL secret
      SUPABASE_PROJECT_ID: "shlcqztfdhfwkhijwgue"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Extract Password from DB_URL
        id: extract_password
        run: |
          # Extract the password from the DB_URL secret format: postgresql://postgres:PASSWORD@host:port/db
          # This assumes the password does not contain an '@' symbol.
          PASSWORD=$(echo "${{ secrets.DB_URL }}" | sed -e 's|^.*://.*:\(.*\)@.*$|\1|')
          echo "::add-mask::$PASSWORD"
          echo "extracted_password=$PASSWORD" >> $GITHUB_OUTPUT

      - name: Reset Staging Database
        env:
          SUPABASE_DB_PASSWORD: ${{ steps.extract_password.outputs.extracted_password }}
        run: |
          # We use db push, but since we want a reset, we first use the CLI to execute a raw query to wipe the public schema
          echo "DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO postgres; GRANT ALL ON SCHEMA public TO public;" > wipe.sql
          
          # Use the CLI to execute the wipe script. The CLI handles IPv4/IPv6 routing properly.
          supabase db execute --file wipe.sql --linked
          
          # Now apply the staging schema
          supabase db execute --file supabase/staging/schema.sql --linked
          
          # Now apply the staging seed data
          supabase db execute --file supabase/staging/seed.sql --linked

