name: Deploy Staging DB

on:
  push:
    branches:
      - staging
    paths:
      - 'supabase/staging/**'
      - 'scripts/reset-staging-db.js'
  workflow_dispatch:

jobs:
  reset-db:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reset Staging Database
        env:
          # Use the DB_URL secret to connect directly via psql
          PG_CONN_STR: ${{ secrets.DB_URL }}
        run: |
          echo "Connecting to Staging Database via psql..."
          
          # Wipe the public schema
          echo "DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO postgres; GRANT ALL ON SCHEMA public TO public;" > wipe.sql
          psql "$PG_CONN_STR" -f wipe.sql
          
          echo "Applying schema..."
          psql "$PG_CONN_STR" -f supabase/staging/schema.sql
          
          echo "Applying seed data..."
          psql "$PG_CONN_STR" -f supabase/staging/seed.sql
          
          echo "Staging DB reset complete!"

