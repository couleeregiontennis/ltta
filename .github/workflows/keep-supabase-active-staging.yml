name: Keep Supabase Active (Staging)

on:
  schedule:
    # Run daily at midnight (UTC) to ensure it stays active
    - cron: "0 0 * * *"
  # Allow running manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-supabase-staging:
    runs-on: ubuntu-latest
    environment: staging

    # We use environment variables to hold Supabase credentials if available as secrets
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Verify Secrets
        run: |
          if [ -z "${SUPABASE_URL}" ]; then
            echo "Error: VITE_SUPABASE_URL is not set in GitHub Secrets for 'staging' environment."
            exit 1
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Error: VITE_SUPABASE_ANON_KEY is not set in GitHub Secrets for 'staging' environment."
            exit 1
          fi
          echo "Secrets are configured."

      - name: Ping Staging Supabase Database
        run: |
          echo "Pinging Staging Supabase 'location' table to ensure database activity..."

          # Retry up to 3 times with a 10-second delay if it fails due to network issues
          for i in {1..3}; do
            echo "Attempt $i..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              "${SUPABASE_URL}/rest/v1/location?select=id&limit=1") || true

            STATUS_CODE=$(echo "$RESPONSE" | tail -n 1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            echo "Staging Supabase responded with status code: $STATUS_CODE"

            if [ "$STATUS_CODE" -eq 200 ]; then
              echo "Successfully queried Staging Supabase database."
              exit 0
            fi

            echo "Attempt $i failed. Status: $STATUS_CODE, Body: $BODY"
            if [ $i -lt 3 ]; then
              echo "Waiting 10 seconds before next attempt..."
              sleep 10
            fi
          done

          echo "Error: Failed to query Staging Supabase database after 3 attempts."
          exit 1
