name: Keep Supabase Active (Prod)

on:
  schedule:
    # Run every 3 days at midnight (UTC) to ensure it stays active
    - cron: "0 0 */3 * *"
  # Allow running manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-supabase-prod:
    runs-on: ubuntu-latest
    environment: production
    
    # We use environment variables to hold Supabase credentials if available as secrets
    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Verify Secrets
        run: |
          if [ -z "${SUPABASE_URL}" ]; then
            echo "Error: VITE_SUPABASE_URL is not set in GitHub Secrets for 'production' environment."
            exit 1
          fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Error: VITE_SUPABASE_ANON_KEY is not set in GitHub Secrets for 'production' environment."
            exit 1
          fi
          echo "Secrets are configured."

      - name: Ping Production Supabase Database
        run: |
          echo "Pinging Production Supabase 'location' table to ensure database activity..."
          
          # Fetch a single row from the location table
          # This requires actual database interaction and counts as activity
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/location?select=id&limit=1")
            
          STATUS_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)
            
          echo "Production Supabase responded with status code: $STATUS_CODE"
          
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "Successfully queried Production Supabase database."
          else
            echo "Failed to query Production Supabase database."
            echo "Status Code: $STATUS_CODE"
            echo "Response Body: $BODY"
            exit 1
          fi
