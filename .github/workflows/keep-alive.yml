name: Keep Supabase Projects Alive

on:
  schedule:
    # Run every 3 days at 00:00 UTC (e.g., Wednesday and Saturday)
    # This is well within Supabase's 7-day inactivity limit.
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Production Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_PRODUCTION || 'https://mzheoplkuuzsegpetukq.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_PRODUCTION || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16aGVvcGxrdXV6c2VncGV0dWtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA5NDc2MzksImV4cCI6MjA2NjUyMzYzOX0.5zh2Q9UqTbPxPEGDyNuZsLFMQ5KeIeOB3t2wPS-cGaE' }}
        run: |
          echo "Pinging Production Supabase..."
          RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null -G "$SUPABASE_URL/rest/v1/player" \
            --data-urlencode "select=id" \
            --data-urlencode "limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Production HTTP Status Code: $RESPONSE"
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "Successfully pinged Production Supabase database!"
          elif [ "$RESPONSE" -eq 521 ] || [ "$RESPONSE" -eq 503 ] || [ "$RESPONSE" -eq 500 ]; then
            echo "WARNING: Production Supabase returned status code $RESPONSE. It might be paused or restoring. Please restore/verify in the Supabase console."
          else
            echo "ERROR: Failed to ping Production Supabase. Returned status code $RESPONSE."
            exit 1
          fi

      - name: Ping Staging Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_STAGING }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "WARNING: Staging secrets (SUPABASE_URL_STAGING and/or SUPABASE_ANON_KEY_STAGING) are not configured. Skipping staging ping."
            echo "To enable staging keep-alive, please add SUPABASE_URL_STAGING and SUPABASE_ANON_KEY_STAGING to your repository secrets."
          else
            echo "Pinging Staging Supabase..."
            RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null -G "$SUPABASE_URL/rest/v1/player" \
              --data-urlencode "select=id" \
              --data-urlencode "limit=1" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY")
            echo "Staging HTTP Status Code: $RESPONSE"
            if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
              echo "Successfully pinged Staging Supabase database!"
            elif [ "$RESPONSE" -eq 521 ] || [ "$RESPONSE" -eq 503 ] || [ "$RESPONSE" -eq 500 ]; then
              echo "WARNING: Staging Supabase returned status code $RESPONSE. It might be paused or restoring. Please restore/verify in the Supabase console."
            else
              echo "ERROR: Failed to ping Staging Supabase. Returned status code $RESPONSE."
              exit 1
            fi
          fi
