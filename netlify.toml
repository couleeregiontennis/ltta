[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[build.processing]
  [build.processing.secrets]
    # Supabase Anon Key and URL are public by design.
    # Netlify's scanner flags them as a false positive.
    omit_keys = ["VITE_SUPABASE_URL", "VITE_SUPABASE_ANON_KEY"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
